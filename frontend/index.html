<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klausur-Evaluator · UKW</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Three.js r160 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>

    <!-- Three.js lives here, behind everything -->
    <canvas id="bg" aria-hidden="true"></canvas>
    
    <!-- Indicator for switching models via TAB -->
    <div id="model-indicator" class="model-indicator" aria-hidden="true"></div>

    <!-- ① UPLOAD SCREEN -->
    <div id="screen-upload" class="screen active">

        <div class="logo-wrap">
            <img src="icon.svg" alt="Uniklinikum Würzburg" class="ukw-logo">
        </div>

        <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
             aria-label=".docx-Klausurdokument hochladen">

            <!-- Spinning conic-gradient border -->
            <div class="dz-spin-border" aria-hidden="true"></div>

            <svg class="dz-icon" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>

            <p class="dz-label"><strong>.docx</strong>-Datei hier ablegen</p>
            <input type="file" id="file-input" accept=".docx" hidden>
        </div>

        <button id="evaluate-btn" class="run-btn" disabled>Analyse starten →</button>

    </div>

    <!-- ② ANALYSIS SCREEN -->
    <div id="screen-analysis" class="screen">

        <img src="icon.svg" alt="" class="analysis-logo" aria-hidden="true">

        <div class="scanner">

            <!-- phase label at top -->
            <div class="scan-phase" id="scan-phase">Initialisierung…</div>

            <!-- question rows filled by JS; beam lives here so it never hits footer -->
            <div id="q-rows" class="q-rows" aria-live="polite">
                <div class="scan-beam" aria-hidden="true"></div>
            </div>

            <!-- footer progress -->
            <div class="scan-foot">
                <span id="scan-msg">—</span>
                <span id="scan-pct">0%</span>
            </div>
        </div>

    </div>

    <!-- ③ DONE SCREEN -->
    <div id="screen-done" class="screen">
        <div class="done-card">
            <svg class="done-ring-svg" viewBox="0 0 72 72" fill="none" aria-hidden="true">
                <circle class="done-track" cx="36" cy="36" r="30" stroke-width="2"/>
                <circle class="done-arc"   cx="36" cy="36" r="30" stroke-width="2"
                        stroke-linecap="round"/>
                <polyline class="done-tick" points="22,37 31,46 50,26"
                          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p class="done-word">Fertig.</p>
            <button id="download-btn" class="dl-btn">Annotierte Datei herunterladen</button>
            <button id="restart-btn" class="restart-link">Weitere Klausur analysieren →</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
